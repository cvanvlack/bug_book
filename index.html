<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f7a8c" />
    <meta
      name="description"
      content="Bug Book is a lightweight personal journal for recording daily scores, hours, and notes."
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Bug Book</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Bug Book v6</p>
        <h1>Daily Bug Book entry</h1>
        <p class="hero-copy">
          Capture the day quickly, save it to your sheet, and move on.
        </p>
      </section>

      <section class="card">
        <div class="card-actions">
          <a class="button-link button-secondary" href="./settings.html">
            Open Settings
          </a>
        </div>

        <form id="entry-form" novalidate>
          <div class="field">
            <label for="entry-date">Date</label>
            <input id="entry-date" name="entryDate" type="date" required />
          </div>

          <fieldset class="field score-field">
            <legend>Score</legend>
            <div class="score-options" role="radiogroup" aria-label="Score">
              <label class="score-option">
                <input type="radio" name="score" value="2" required />
                <span>+2</span>
              </label>
              <label class="score-option">
                <input type="radio" name="score" value="1" />
                <span>+1</span>
              </label>
              <label class="score-option">
                <input type="radio" name="score" value="0" />
                <span>0</span>
              </label>
              <label class="score-option">
                <input type="radio" name="score" value="-1" />
                <span>-1</span>
              </label>
              <label class="score-option">
                <input type="radio" name="score" value="-2" />
                <span>-2</span>
              </label>
            </div>
          </fieldset>

          <div class="grid-two">
            <div class="field">
              <label for="creative-hours">Creative minutes</label>
              <select
                id="creative-hours"
                name="creativeMinutes"
                required
              >
                <option value="">Select creative minutes</option>
              </select>
            </div>

            <div class="field">
              <label for="social-hours">Social minutes</label>
              <select
                id="social-hours"
                name="socialMinutes"
                required
              >
                <option value="">Select social minutes</option>
              </select>
            </div>

            <div class="field">
              <label for="meditation-minutes">Meditation minutes</label>
              <select
                id="meditation-minutes"
                name="meditationMinutes"
                required
              >
                <option value="">Select meditation minutes</option>
              </select>
            </div>

            <div class="field">
              <label for="exercise-minutes">Exercise minutes</label>
              <select
                id="exercise-minutes"
                name="exerciseMinutes"
                required
              >
                <option value="">Select exercise minutes</option>
              </select>
            </div>

            <div class="field">
              <label for="outdoor-minutes">Outdoor minutes</label>
              <select
                id="outdoor-minutes"
                name="outdoorMinutes"
                required
              >
                <option value="">Select outdoor minutes</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="day-description">Brief description</label>
            <textarea
              id="day-description"
              name="dayDescription"
              rows="4"
              maxlength="1000"
              required
            ></textarea>
          </div>

          <div class="field">
            <label for="score-reason">Why this score?</label>
            <textarea
              id="score-reason"
              name="scoreReason"
              rows="5"
              maxlength="1500"
              required
            ></textarea>
          </div>

          <div
            id="status"
            class="status status-neutral"
            role="status"
            aria-live="polite"
            tabindex="-1"
          >
            Missing setup. Open Settings to add your Apps Script endpoint URL and
            API key for this browser.
          </div>

          <button id="submit-button" class="submit-button" type="submit">
            Save entry
          </button>
        </form>
      </section>
    </main>

    <script src="./settings-store.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
